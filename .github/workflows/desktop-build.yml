name: Desktop Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    name: Build ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: locus-linux-x64
            bundle_path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          - platform_name: Windows x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: locus-windows-x64
            bundle_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend sidecar (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/binaries
          python -m PyInstaller backend/app/main.py \
            --name locus-backend \
            --onefile \
            --paths backend \
            --distpath backend/dist \
            --workpath backend/build/pyinstaller \
            --specpath backend/build \
            --clean
          cp -f backend/dist/locus-backend src-tauri/binaries/locus-backend-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/locus-backend-x86_64-unknown-linux-gnu
          cargo build --release --manifest-path tools/window-probe/Cargo.toml --target x86_64-unknown-linux-gnu
          cp -f tools/window-probe/target/x86_64-unknown-linux-gnu/release/locus-window-probe src-tauri/binaries/locus-window-probe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/locus-window-probe-x86_64-unknown-linux-gnu

      - name: Build backend sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/binaries -Force | Out-Null
          python -m PyInstaller backend/app/main.py --name locus-backend --onefile --paths backend --distpath backend/dist --workpath backend/build/pyinstaller --specpath backend/build --clean
          Copy-Item -Path backend/dist/locus-backend.exe -Destination src-tauri/binaries/locus-backend-x86_64-pc-windows-msvc.exe -Force
          cargo build --release --manifest-path tools/window-probe/Cargo.toml --target x86_64-pc-windows-msvc
          Copy-Item -Path tools/window-probe/target/x86_64-pc-windows-msvc/release/locus-window-probe.exe -Destination src-tauri/binaries/locus-window-probe-x86_64-pc-windows-msvc.exe -Force

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "=1.6.6" --locked --force

      - name: Build desktop bundle
        run: cargo tauri build --target ${{ matrix.rust_target }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_path }}
            src-tauri/target/${{ matrix.rust_target }}/release/locus*
